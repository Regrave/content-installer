name: Build Extension Package

on:
  push:
    tags:
      - 'v*'
    branches:
      - beta

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .c7s.zip
        run: zip -r gg_ir77_contentinstaller.c7s.zip Metadata.toml frontend/ backend/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: gg_ir77_contentinstaller.c7s.zip
          generate_release_notes: true

      - name: Upload Beta Artifact
        if: github.ref == 'refs/heads/beta'
        uses: actions/upload-artifact@v4
        with:
          name: gg_ir77_contentinstaller-beta
          path: gg_ir77_contentinstaller.c7s.zip
